# ============================================================
# AustroFit – Technische Strategie & Systemlogik
# Version: 1.6
# Zweck: Maschinenlesbarer Kontext für Claude Code / VS Code
# Stand: März 2026
# Änderungen v1.6: Level-System auf 20 Levels erweitert (5-Jahres-Horizont, neue österr. Namen)
#   Skalierender Streak-Bonus (4 Tiers) für Schritte, Cardio und Quiz
#   Quiz-Streak-Bonus neu implementiert (streak_quiz source_type, täglich ab Tag 2)
#   Quiz-Cooldown: 30 Tage (war 90)
#   Cardio-Streak: Tier-Logik statt Meilenstein-only; dedup auf cardio-streak-{weekKey}
#   BuchungsZeile: streak_tag + streak_quiz gemappt; ledger-entries Streak-Filter erweitert
# Änderungen v1.5: Cardio-Tracking implementiert (cardioService.ts, cardioSync.ts, /api/cardio/sync)
#   Nutzergruppen (adult/senior/pregnant/chronic) → activity_group auf user_profiles
#   Neue Collection: activity_logs (Workout-Sessions, Äquivalenz-Minuten, week_key)
#   points_ledger: neue Felder source_id, rule_version, meta, description, entry_date, points
#   Registrierung: 3-Step (Konto → Gruppenauswahl → E-Mail); init-onboarding jetzt in Login gerufen
#   Intensitäts-Mapping: moderat 1× / intensiv 2× via @capgo/capacitor-health queryWorkouts()
#   Ski/Snowboard/Tanzen: Phase 2 (Plugin-Limitation)
# Änderungen v1.4: Level-System korrigiert (8 Levels, Österr. Landschaft – entspricht level.ts)
#   Punkte-Formel 4000–6999 korrigiert (Gleitende Skala implementiert, kein Flat-Rate MVP)
#   Streak-Datenspeicher: streak_days/longest_streak auf user_profiles Collection (nicht directus_users)
#   Routes: /partner → /belohnung; /profil/gutscheine gelöscht (Gutscheine in /belohnung Aktiv-Tab)
#   reward_redemptions: Felder user/reward/status/points_cost (entspricht tatsächlicher Collection)
#   AWIN: Teilimplementiert (fetchAwinPrograms, Offen-Tab in /belohnung) – kein vollständiger Webhook
# Änderungen v1.3: Android Health Connect native Build fertig (git commit März 2026)
#   @capgo/capacitor-health v8.2.17 installiert + getestet
#   Klarstellung: rewards_direktpartner = CODE fertig, kein Business-Betrieb
#   AWIN = Phase 1 (Business), Direktpartner = Phase 2 (Business)
# ============================================================

