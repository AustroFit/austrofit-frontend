      min_punkte: 200
      max_punkte: 499
    - stufe: 3
      name: "Gesundheitsprofi"
      min_punkte: 500
      max_punkte: 999
    - stufe: 4
      name: "Vitalexperte"
      min_punkte: 1000
      max_punkte: 2499
    - stufe: 5
      name: "AustroFit Champion"
      min_punkte: 2500
      max_punkte: null

