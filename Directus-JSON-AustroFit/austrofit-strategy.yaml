# ============================================================
# WERT-EXCHANGE GRUNDLOGIK
# ============================================================

wert_exchange:
  regel: "100 Punkte = 1 € Gegenwert"
  gilt_fuer: "alle Partner-Typen (Direktpartner implementiert, Affiliate Phase 2)"
  kommunikation:
    prinzip: "Dual – Punktestand + Aktivitäts-Sprache"
    beispiele:
      - kontext: "Dashboard-Header"
        anzeige: "1.240 Pt gesammelt"
      - kontext: "Aktivitäts-Feed"
        anzeige: "7.000 Schritte heute – +40 Pt verdient"
      - kontext: "Quiz-Abschluss"
        anzeige: "Quiz abgeschlossen – +40 Pt für deine Gesundheit"
      - kontext: "Rewards-Page (Direktpartner)"
        anzeige: "500 Pt = 5 € bei FitnessCenter Wien"
      - kontext: "Streak-Notification"
        anzeige: "7 Tage in Folge aktiv – +60 Bonus-Pt"
  hinweis: >
    Euro-Äquivalent nur bei Direktpartnern explizit kommunizieren,
    wo ein echter Rabatt verhandelt wurde. Bei AWIN-Partnern (Phase 2) in
    Punkten und Aktivitäts-Sprache bleiben.

# ============================================================
# PUNKTEFORMEL (Ist-Stand Implementierung)
# ============================================================

punkteformel:
  version: "1.0-MVP-implementiert"
  hinweis: >
    Vereinfachte MVP-Formel. Die gleitende Skala 4001–6999 (ursprünglich geplant)
    ist in der aktuellen Implementierung als Flat-Rate 10P vereinfacht.
    Geplante Erweiterung auf vollständige gleitende Skala in Phase 2.
    Änderungen niemals retroaktiv – nur für neue Einträge.
  implementierungsdatei: "src/lib/server/stepsService.ts + src/lib/utils/streak.ts"

  schritte:
    einheit: "täglich"
    implementiert: true
    regeln:
      - von: 0
        bis: 3999
        punkte: 0
        grund: "Unterhalb nachgewiesenem Mortalitäts-Schwellwert"
      - von: 4000
        bis: 6999
        punkte: 10
        implementierung: "Flat-Rate (MVP)"
        geplant_phase2: "Gleitende Skala: 10 + floor((schritte - 4001) / 500) * 5"
        grund: "Erste messbare Mortalitätsreduktion"
      - von: 7000
        bis: 7000
        punkte: 40
        label: "Volle Tagespunkte"
        grund: "7.000 Schritte senken Sterberisiko um ~50–70%"
      - von: 7001
        bis: null  # kein Deckel
        formel: "40 + floor((schritte - 7000) / 500) * 5"
        beispiele:
          - schritte: 10000
            punkte: 70
          - schritte: 20000
            punkte: 170
        fraud_check: true
        fraud_cap: 20000  # Tagesschritte > 20.000 werden geloggt und geprüft
        grund: "Je mehr desto besser – aber Fraud-Checks aktiv"

  bewegung:
    einheit: "wöchentlich (Laufen + Radfahren in Minuten)"
    implementiert: false
    geplant: "Phase 2 – nach Capacitor native Build"
    regeln:
      - von: 0
        bis: 49
        punkte: 0
      - von: 50
        bis: 50
        punkte: 50
      - von: 51
        bis: 150
        formel: "50 + ceil((minuten - 50) / 10) * 15"
      - von: 150
        bis: 150
        punkte: 200
        label: "Volle Wochenpunkte"
      - von: 151
        bis: null
        formel: "200 + ceil((minuten - 150) / 10) * 15"
        fraud_check: true

  bildung:
    implementiert: true
    implementierungsdatei: "src/routes/api/quiz-attempts/+server.js"
    regeln:
      - ereignis: "quiz_abschluss"
        bedingung: "score === totalQuestions (100% – jede Frage richtig)"
        punkte: 40
        cooldown_tage: "cooldown_days aus quizzes Collection (default 90)"
        anonym: true  # auch ohne Login verdienbar, dann Claim nach Registrierung
      - ereignis: "refresh_quiz"
        bedingung: "cooldown_days nach letztem Abschluss erneut 100%"
        punkte: 40

  streak_boni:
    implementiert: "Teilweise – nur Schritt-Streak (täglicher Bonus geplant, wöchentlicher Milestone implementiert)"
    implementierungsdatei: "src/lib/utils/streak.ts + src/lib/server/stepsService.ts"
    regeln:
      - modul: "schritte"
        typ: "streak_woche_milestone"
        bedingung: "streak_days % 7 === 0 (d.h. Tag 7, 14, 21, …)"
        punkte: 60
        implementiert: true
        beispiel: "7-Tage-Streak = +60 P, 14-Tage-Streak = +60 P, ..."
      - modul: "schritte"
        typ: "streak_tag_bonus"
        bedingung: "Min. 7.000 Schritte an aufeinanderfolgenden Tagen"
        punkte: 20  # ½ × 40
        implementiert: false
        geplant: "Phase 2"
      - modul: "bewegung"
        typ: "streak_woche"
        bedingung: "Zweite (+ jede folgende) Woche in Serie ≥ 150 min"
        punkte: 100
        implementiert: false
        geplant: "Phase 2"
      - modul: "bewegung"
        typ: "streak_monat"
        bedingung: "4 aufeinanderfolgende Ziel-Wochen"
        punkte: 300
        badge: "Move-Champion"
        implementiert: false
        geplant: "Phase 2"
      - modul: "bildung"
        typ: "wissens_combo"
        bedingung: "3 perfekte Quizze innerhalb von 7 Tagen"
        punkte: 40
        implementiert: false
        geplant: "Phase 2"

