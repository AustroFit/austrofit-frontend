# ============================================================
# PUNKTEFORMEL (Ist-Stand Implementierung)
# ============================================================

punkteformel:
  version: "1.0-MVP-implementiert"
  hinweis: >
    Vereinfachte MVP-Formel. Die gleitende Skala 4001–6999 (ursprünglich geplant)
    ist in der aktuellen Implementierung als Flat-Rate 10P vereinfacht.
    Geplante Erweiterung auf vollständige gleitende Skala in Phase 2.
    Änderungen niemals retroaktiv – nur für neue Einträge.
  implementierungsdatei: "src/lib/server/stepsService.ts + src/lib/utils/streak.ts"

  schritte:
    einheit: "täglich"
    implementiert: true
    regeln:
      - von: 0
        bis: 3999
        punkte: 0
        grund: "Unterhalb nachgewiesenem Mortalitäts-Schwellwert"
      - von: 4000
        bis: 6999
        formel: "10 + floor((schritte - 4000) / 500) * 5"
        implementierung: "Gleitende Skala (implementiert)"
        beispiele:
          - schritte: 4000
            punkte: 10
          - schritte: 4500
            punkte: 15
          - schritte: 5000
            punkte: 20
          - schritte: 6500
            punkte: 35
        grund: "Erste messbare Mortalitätsreduktion"
      - von: 7000
        bis: 7000
        punkte: 40
        label: "Volle Tagespunkte"
        grund: "7.000 Schritte senken Sterberisiko um ~50–70%"
      - von: 7001
        bis: null  # kein Deckel
        formel: "40 + floor((schritte - 7000) / 500) * 5"
        beispiele:
          - schritte: 10000
            punkte: 70
          - schritte: 20000
            punkte: 170
        fraud_check: true
        fraud_cap: 20000  # Tagesschritte > 20.000 werden geloggt und geprüft
        grund: "Je mehr desto besser – aber Fraud-Checks aktiv"

  bewegung:
    einheit: "wöchentlich (Äquivalenz-Minuten – moderat 1×, intensiv 2×)"
    implementiert: true
    implementierungsdateien:
      - "src/lib/server/cardioService.ts"
      - "src/lib/services/cardioSync.ts"
      - "src/routes/api/cardio/sync/+server.ts"
    nutzergruppen:
      adult:    { wochenziel_min: 150, start_schwelle_min: 50, intensiv_erlaubt: true }
      senior:   { wochenziel_min: 150, start_schwelle_min: 50, intensiv_erlaubt: true }
      pregnant: { wochenziel_min: 150, start_schwelle_min: 50, intensiv_erlaubt: false }
      chronic:  { wochenziel_min: 100, start_schwelle_min: 35, intensiv_erlaubt: true }
    intensity_mapping:
      moderat_1x: [walking, hiking, stairClimbing, elliptical, other]
      intensiv_2x: [running, cycling, crossTraining]
      ignoriert: [yoga, strengthTraining, swimming, soccer, basketball, tennis, rowing]
      phase2: [skiing, crossCountrySkiing, snowboarding, dancing]
    streak_boni:
      implementiert: true
      implementierungsdatei: "src/lib/server/cardioService.ts (awardCardioStreakBonuses)"
      hinweis: >
        Meilenstein-Boni (nicht wöchentlich wiederkehrend bei W2).
        Ab W5+ wird +300P jede weitere konsekutive Woche erneut vergeben,
        da der Code die letzten 4 Ledger-Einträge prüft (consecutiveFullWeeks bleibt 4).
      - bedingung: "2 aufeinanderfolgende Wochen ≥ Wochenziel (200P)"
        bonus: 100
        source_type: streak
        source_ref: "cardio-streak-2w-{weekKey}"
      - bedingung: "4 aufeinanderfolgende Wochen ≥ Wochenziel (200P) – danach jede weitere Woche"
        bonus: 300
        source_type: streak
        source_ref: "cardio-streak-4w-{weekKey}"
    regeln:
      - von: 0
        bis: 49
        punkte: 0
      - von: 50
        bis: 50
        punkte: 50
      - von: 51
        bis: 150
        formel: "50 + ceil((minuten - 50) / 10) * 15"
      - von: 150
        bis: 150
        punkte: 200
        label: "Volle Wochenpunkte"
      - von: 151
        bis: null
        formel: "200 + ceil((minuten - 150) / 10) * 15"
        fraud_check: true

  bildung:
    implementiert: true
    implementierungsdatei: "src/routes/api/quiz-attempts/+server.ts"
    regeln:
      - ereignis: "quiz_abschluss"
        bedingung: "score === totalQuestions (100% – jede Frage richtig)"
        punkte: 40
        cooldown_tage: 30  # pro Quiz in Directus konfiguriert
        anonym: true  # auch ohne Login verdienbar, dann Claim nach Registrierung
      - ereignis: "refresh_quiz"
        bedingung: "30 Tage nach letztem Abschluss erneut 100%"
        punkte: 40

  streak_boni:
    implementiert: "Alle Module (Schritte, Cardio, Quiz) – tiered, skalierend"
    implementierungsdatei: "src/lib/utils/streak.ts + src/lib/server/stepsService.ts + src/lib/server/cardioService.ts"
    logik_hinweis: >
      Tag 0 / Woche 1 = erster qualifizierender Eintrag → startet den Streak, kein Bonus.
      Ab Tag 2 / Woche 2 → Streak-Bonus, Höhe steigt mit Tier.
      Tiers skalieren mit Dauer: je länger der Streak, desto höher der Bonus.
    regeln:
      - modul: "schritte"
        typ: "streak_tag_bonus"
        bedingung: "streak_days > 1 (ab dem 2. aufeinanderfolgenden ≥7k-Tag)"
        tiers:
          - tage: "2–13"
            punkte: 20
          - tage: "14–27"
            punkte: 30
          - tage: "28–55"
            punkte: 45
          - tage: "56+"
            punkte: 60
        source_type: "streak_tag"
        source_ref: "YYYY-MM-DD"
        implementiert: true
      - modul: "schritte"
        typ: "streak_woche_milestone"
        bedingung: "(streak_days - 1) % 7 === 0 && streak_days > 1"
        tiers:
          - meilenstein: "Tag 8"
            punkte: 60
          - meilenstein: "Tage 15, 22"
            punkte: 90
          - meilenstein: "Tage 29–50"
            punkte: 120
          - meilenstein: "Tage 57+"
            punkte: 150
        source_type: "streak"
        source_ref: "streak-{N}d-{datum}"
        implementiert: true
      - modul: "schritte"
        typ: "milestone_first_goal"
        bedingung: "Erstes Mal ≥7.000 Schritte – einmalig"
        punkte: 50
        source_type: "milestone"
        source_ref: "milestone-first_goal"
        implementiert: true
      - modul: "schritte"
        typ: "milestone_first_streak_3"
        bedingung: "streak_days === 4 (= 3 Streak-Bonus-Tage nach dem Starttag) – einmalig"
        punkte: 80
        source_type: "milestone"
        source_ref: "milestone-first_streak_3"
        implementiert: true
      - modul: "bewegung"
        typ: "streak_woche"
        bedingung: "≥2 aufeinanderfolgende Wochen ≥ 200P Cardio – jede weitere Woche"
        tiers:
          - wochen: "2–3"
            punkte: 100
          - wochen: "4–7"
            punkte: 200
          - wochen: "8–11"
            punkte: 300
          - wochen: "12+"
            punkte: 400
        source_type: "streak"
        source_ref: "cardio-streak-{weekKey}"
        implementiert: true
      - modul: "bildung"
        typ: "quiz_streak_tag_bonus"
        bedingung: "quiz_streak_days > 1 (tägliche Quiz-Completion in Folge)"
        tiers:
          - tage: "2–6"
            punkte: 5
          - tage: "7–13"
            punkte: 10
          - tage: "14–29"
            punkte: 15
          - tage: "30+"
            punkte: 20
        source_type: "streak_quiz"
        source_ref: "YYYY-MM-DD"
        implementiert: true
      - modul: "bildung"
        typ: "quiz_streak_woche_milestone"
        bedingung: "(quiz_streak_days - 1) % 7 === 0 && quiz_streak_days > 1"
        tiers:
          - meilenstein: "Tag 8"
            punkte: 30
          - meilenstein: "Tag 15"
            punkte: 50
          - meilenstein: "Tage 22, 29"
            punkte: 75
          - meilenstein: "Tage 36+"
            punkte: 100
        source_type: "streak"
        source_ref: "quiz-streak-{N}d-{datum}"
        implementiert: true
      - modul: "bildung"
        typ: "wissens_combo"
        bedingung: "3 perfekte Quizze innerhalb von 7 Tagen"
        punkte: 40
        implementiert: false
        geplant: "Phase 2"

