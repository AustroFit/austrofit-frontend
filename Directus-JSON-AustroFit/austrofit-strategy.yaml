# ============================================================
# WICHTIG: Die Collection-Namen in v1.1 wichen vom Code ab.
# Diese Version dokumentiert die real existierenden Collections.

directus_collections:

  rewards:
    beschreibung: "Angebote von Direktpartnern (Phase 1). Kein AWIN in dieser Collection."
    hinweis: "In v1.1 als 'partner_offers' beschrieben – tatsächlicher Name: 'rewards'"
    felder:
      id:               { typ: uuid, auto: true }
      titel:            { typ: string, required: true }
      beschreibung:     { typ: text }
      punkte_kosten:    { typ: integer, required: true }
      gutschein_code:   { typ: string, beschreibung: "Partner-Code für Scan/Vorlage" }
      gueltig_bis:      { typ: datetime }
      aktiv:            { typ: boolean, default: true }
      partner_id:       { typ: m2o, referenz: partner }

  reward_redemptions:
    beschreibung: "Jede Gutschein-Einlösung eines Users"
    hinweis: "In v1.1 als 'redemptions' beschrieben – tatsächlicher Name: 'reward_redemptions'"
    felder:
      id:               { typ: uuid, auto: true }
      user:             { typ: m2o, referenz: directus_users, required: true }   # nicht user_id!
      reward:           { typ: m2o, referenz: rewards, required: true }           # nicht reward_id!
      points_cost:      { typ: integer, beschreibung: "Punkte zum Einlösezeitpunkt" }
      status:           { typ: string, optionen: [active, used], beschreibung: "active = nicht verwendet, used = eingelöst" }
      created_at:       { typ: datetime, auto: true }

  points_ledger:
    beschreibung: "Audit-Log jeder Punktebewegung – nie löschen, nur ergänzen"
    hinweis: "In v1.1 als 'points_log' beschrieben – tatsächlicher Name: 'points_ledger'"
    implementierungsdatei: "Alle /api/* Server-Routen schreiben hierher"
    felder:
      id:           { typ: uuid, auto: true }
      user:         { typ: m2o, referenz: directus_users, required: true }
      points_delta: { typ: integer, beschreibung: "Positiv = Gutschrift, Negativ = Abzug" }
      source_type:  { typ: string, optionen: [schritte, streak_tag, streak, milestone, education, einloesung, awin_commission, awin_storno, awin_unlock] }
      source_ref:   { typ: string, beschreibung: "Referenz-ID (Quiz-ID, Datum bei Schritten, Redemption-ID, etc.)" }
      occurred_at:  { typ: datetime, auto: true }
    api_routes:
      gesamt_positiv: "GET /api/ledger-total?user=userId&positive_only=true  → earnedPoints (für Level)"
      gesamt_netto:   "GET /api/ledger-total?user=userId                     → totalPoints (für Einkauf)"
      eintraege:      "GET /api/ledger-entries?user=userId&limit=20&offset=0&source_type=..."

  partner:
    beschreibung: "Direktpartner-Firmen (Fitness, Ernaehrung, Apotheke, Wellness)"
    felder:
      id:             { typ: uuid, auto: true }
      name:           { typ: string, required: true }
      kategorie:      { typ: string, optionen: [fitness, ernaehrung, apotheke, wellness] }
      region:         { typ: string, beschreibung: "Bundesland oder 'österreichweit'" }
      adresse:        { typ: string }
      esg_zertifiziert: { typ: boolean, default: false }
      logo_url:       { typ: string }

  gutscheine:
    beschreibung: "Alias/View auf reward_redemptions – User-seitige Gutschein-Übersicht"
    hinweis: "Wird via /api/gutscheine mit 90-Tage Ablauf-Logik berechnet"
    status_berechnung:
      aktiv: "eingeloest_am IS NULL AND ablaeuft_am > NOW()"
      verwendet: "eingeloest_am IS NOT NULL"
      abgelaufen: "eingeloest_am IS NULL AND ablaeuft_am <= NOW()"

  quiz_attempts:
    beschreibung: "Quiz-Versuche (anonym + authentifiziert)"
    felder:
      id:                   { typ: uuid, auto: true }
      anonymous_id:         { typ: string, beschreibung: "localStorage austrofit_anonymous_id" }
      quiz:                 { typ: m2o, referenz: quizzes }
      score:                { typ: integer }
      max_score:            { typ: integer }
      passed:               { typ: boolean }
      eligible_points:      { typ: integer, beschreibung: "40 bei 100% – wird bei Claim auf User gebucht" }
      points_claimed_at:    { typ: datetime, nullable: true }
      user_id:              { typ: m2o, referenz: directus_users, nullable: true, beschreibung: "Nach Claim gesetzt" }

  quizzes:
    beschreibung: "Quiz-Definitionen, verknüpft mit Artikeln"
    felder:
      id:           { typ: uuid, auto: true }
      article_id:   { typ: m2o, referenz: articles }
      quiz_json:    { typ: json, beschreibung: "Fragen + Antworten" }
      version:      { typ: integer }
      status:       { typ: string, optionen: [published, draft] }
      cooldown_days: { typ: integer, default: 90 }

  articles:
    beschreibung: "Gesundheits-Artikel mit eingebetteten Quizzen"
    felder:
      id:                 { typ: uuid, auto: true }
      slug:               { typ: string, unique: true }
      title:              { typ: string }
      description:        { typ: text }
      content:            { typ: richtext }
      image:              { typ: image }
      status:             { typ: string, optionen: [published, draft] }
      learning_module_id: { typ: m2o, referenz: learning_modules }

  user_profiles:
    beschreibung: "Separate Collection für User-Profil-Erweiterungen (NICHT auf directus_users)"
    hinweis: "streak.ts liest/schreibt user_profiles via filter[user][_eq]=userId"
    felder:
      id:                    { typ: uuid, auto: true }
      user:                  { typ: m2o, referenz: directus_users, required: true }
      streak_days:           { typ: integer, default: 0 }
      longest_streak:        { typ: integer, default: 0 }
      quiz_streak_days:      { typ: integer, default: 0 }
      health_connected:      { typ: boolean, default: false }
      onboarding_completed:  { typ: boolean, default: false }

# ============================================================
# API-ROUTES ÜBERSICHT (Ist-Stand)
# ============================================================

api_routes:

  auth:
    - methode: POST
      pfad: /api/auth/login
      beschreibung: "E-Mail + Passwort Login → JWT Token"
    - methode: POST
      pfad: /api/auth/register
      beschreibung: "E-Mail + Passwort Registrierung"
    - methode: GET
      pfad: /api/me
      beschreibung: "Aktuelles User-Profil via Bearer Token"

  profil:
    - methode: GET
      pfad: /api/profile
      beschreibung: "Erweitertes Profil (streak_days, longest_streak, health_connected)"
    - methode: PATCH
      pfad: /api/profile
      beschreibung: "Profil-Update"
    - methode: DELETE
      pfad: /api/profile/delete
      beschreibung: "Account-Löschung + Cascade (DSGVO)"

  punkte:
    - methode: GET
      pfad: /api/ledger-total
      parameter: "user=userId, optional: positive_only=true"
      beschreibung: "Punkte-Summe – netto oder nur Gutschriften (earnedPoints für Level)"
    - methode: GET
      pfad: /api/ledger-entries
      parameter: "user=userId, limit=20, offset=0, source_type=..."
      beschreibung: "Paginierte Ledger-Historie"

  schritte:
    - methode: POST
      pfad: /api/steps/manual
      body: "{ date: YYYY-MM-DD, steps: integer }"
      beschreibung: "Manuelle Schritt-Eingabe (Test-Modus) – dedupliziert via source_ref=date"
    - methode: POST
      pfad: /api/steps/sync
      body: "{ date: YYYY-MM-DD, steps: integer, mode: 'health_connect'|'test' }"
      beschreibung: "Batch-Sync aus Capacitor Health; SCHRITTE_FLOW_ID triggert Directus Flow wenn gesetzt"

  quiz:
    - methode: GET
      pfad: /api/quizzes
      beschreibung: "Alle aktiven Quizze"
    - methode: POST
      pfad: /api/quiz-attempts
      beschreibung: "Quiz-Versuch speichern (anonym oder User)"
    - methode: GET
      pfad: /api/quiz-status
      parameter: "quizId=..."
      beschreibung: "Hat User das Quiz bereits bestanden (inkl. Cooldown-Check)?"
    - methode: POST
      pfad: /api/claim
      beschreibung: "Anonyme Quiz-Punkte nach Login/Registrierung claimen"

  partner_rewards:
    - methode: GET
      pfad: /api/partner
      parameter: "kategorie=..., region=..., esg=true"
      beschreibung: "Direktpartner mit Angeboten"
    - methode: POST
      pfad: /api/redeem
      body: "{ reward_id: uuid }"
      beschreibung: "Reward einlösen → erstellt reward_redemption + negative Ledger-Buchung"
    - methode: GET
      pfad: /api/gutscheine
      beschreibung: "User-Gutscheine (aktiv/verwendet/abgelaufen)"

# ============================================================
# ROUTEN-ÜBERSICHT (Ist-Stand)
# ============================================================

sveltekit_routes:

  oeffentlich:
    - pfad: /
      beschreibung: "Homepage (via CMS pages)"
    - pfad: /artikel
      beschreibung: "Artikel-Liste mit Kategoriefilter, Suche, Pagination"
    - pfad: /gesundheitswegweiser
      beschreibung: "Gesundheitswegweiser (gefilterte Artikel-Ansicht)"
    - pfad: /[collection]/[slug]
      beschreibung: "Dynamische Artikel-Detailseite mit eingebettetem Quiz"
    - pfad: /login
      beschreibung: "E-Mail + Passwort Login"
    - pfad: /registrierung
      beschreibung: "Registrierung (Benutzername + E-Mail + Passwort)"
    - pfad: /partner-werden
      beschreibung: "Direktpartner-Anmeldung (Landing Page)"
    - pfad: /datenschutz
      beschreibung: "Datenschutzerklärung"
    - pfad: /impressum
      beschreibung: "Impressum"

  geschuetzt:
    - pfad: /dashboard
      beschreibung: "User-Dashboard: Punkte, Level, Streak, Badges, Schritte, Quizze, Challenges, Partner-Angebot"
    - pfad: /profil
      beschreibung: "Profil-Einstellungen: Persönliche Daten, Health-Verbindung, Datenschutz & Account"
    - pfad: /profil/punkte
      beschreibung: "Vollständige Ledger-Historie + Badge-Grid + Level-Roadmap"
    # /profil/gutscheine wurde GELÖSCHT (März 2026) – Gutscheine jetzt im Aktiv-Tab von /belohnung
    - pfad: /belohnung
      beschreibung: "Partner-Marketplace: Tab Offen (AWIN-Angebote), Tab Aktiv (eingelöste Gutscheine), Tab Archiv"

# ============================================================
# FRAUD-DETECTION (Ist-Stand Phase 1)
# ============================================================

fraud_detection:

  implementiert:
    - id: "schritt_cap"
      beschreibung: "Tagesschritte > 20.000 werden geloggt – über 20.000 werden auf 20.000 gekappt"
      schwellwert: 20000
      implementiert: true
    - id: "balance_check"
      beschreibung: "Einlösung blockiert wenn Punktestand nach Abzug < 0"
      implementiert: true
    - id: "deduplizierung"
      beschreibung: "Pro User + Datum nur ein Schritt-Eintrag (source_type='schritte', source_ref=datum)"
      implementiert: true

  geplant_phase2:
    - id: "device_check"
      beschreibung: "Kein doppeltes Einlösen desselben Codes pro Gerät"
    - id: "einloese_frequenz"
      beschreibung: "Max. 3 Einlösungen beim selben Partner innerhalb 7 Tagen"
      max_pro_woche: 3
    - id: "warn_sperr_logik"
      beschreibung: "Stufenweise Warnung → Einschränkung → Sperre"

# ============================================================
# ANALYTICS (Ist-Stand)
# ============================================================

analytics:
  implementiert: true
  backend: "PostHog EU Cloud (eu.i.posthog.com)"
  datenschutz: "DSGVO-konform, Frankfurt (EU-Region)"
  implementierungsdatei: "src/lib/utils/mixpanel.ts"
  hinweis: "Dateiname mixpanel.ts (historisch) – nutzt intern PostHog"
  env_var: "PUBLIC_POSTHOG_TOKEN"
  events:
    - name: "user_registered"
    - name: "user_logged_in"
    - name: "dashboard_viewed"
      props: "first_visit: boolean"
    - name: "health_permission_result"
      props: "result: granted|denied|later"
    - name: "quiz_completed"
      props: "quiz_id, passed, score"
    - name: "steps_synced"
      props: "days_synced, total_steps"
    - name: "voucher_redeemed"
      props: "reward_id, points_spent"

# ============================================================
# ENV-VARIABLEN
# ============================================================

env_variablen:
  public:
    - name: "PUBLIC_CMSURL"
      beschreibung: "Directus Base-URL (öffentlich)"
    - name: "PUBLIC_POSTHOG_TOKEN"
      beschreibung: "PostHog EU Token (phc_xxx)"
  private:
    - name: "DIRECTUS_READ_TOKEN"
      beschreibung: "Read-only statischer Token"
    - name: "DIRECTUS_WRITE_TOKEN"
      beschreibung: "Write statischer Token"
    - name: "PRIVATE_CMS_STATIC_TOKEN"
      beschreibung: "Admin-Token für Claim & Ledger"
    - name: "SCHRITTE_FLOW_ID"
      beschreibung: "Optional: Directus Flow ID für Schritt-Verarbeitung; ohne → direkter stepsService"

# ============================================================
# PHASE 2 ROADMAP
# ============================================================

phase_2_roadmap:
  - feature: "AWIN Affiliate Integration"
    beschreibung: "Webhook /api/awin/webhook, Deeplink-Generation, clickRef=user_id"
    voraussetzung: "AWIN Publisher-Account + Österreich-Advertiser genehmigt"
  - feature: "Gleitende Schritt-Skala 4001–6999"
    beschreibung: "Ersetze Flat-Rate 10P durch 10 + floor((schritte-4001)/500)*5"
    hinweis: "Nur für neue Einträge – niemals retroaktiv"
  - feature: "Täglicher Streak-Bonus (+20P/Tag)"
    beschreibung: "FERTIG (März 2026) – streak_tag_bonus ab dem 2. aufeinanderfolgenden ≥7k-Tag implementiert"
    status: "IMPLEMENTIERT"
  - feature: "Bewegungs-Tracking (Laufen + Radfahren)"
    beschreibung: "Wöchentliche Aggregation, WHO-Ziel 150 min/Woche"
    voraussetzung: "Android Health Connect native Build FERTIG – Erweiterung auf workout_types nötig"
  - feature: "B2B Partner-Dashboard"
    beschreibung: "Self-Service für Direktpartner: Angebots-Upload, Statistiken"
  - feature: "Erweiterte Fraud-Detection"
    beschreibung: "Device-Check, Frequenz-Limit, Warn/Sperr-Logik"
  - feature: "Community-Features"
    beschreibung: "Leaderboard, Social Sharing, etc."
  - feature: "iOS Background Sync Fallback"
    beschreibung: "Periodic Background Sync nicht auf iOS verfügbar – Polling-Fallback nötig"
