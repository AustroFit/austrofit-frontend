    qualitativ:
      - Nutzerumfragen (HLS-EU-Q16 nach 3 Monaten)
      - App-Store-Bewertungen
      - Forschungspartnerschaften

# ──────────────────────────────────────────────
# ANHANG A1: PUNKTEFORMEL
# ──────────────────────────────────────────────
punkteformel:
  implementierungshinweis: >
    MVP-Vereinfachung (implementiert in src/lib/utils/streak.ts + stepsService.ts):
    Die gleitende Skala 4001–6999 ist als Flat-Rate 10P vereinfacht.
    Die vollständige gleitende Skala (10 + floor((schritte-4001)/500)*5) ist für Phase 2 geplant.
    Änderungen der Formel niemals retroaktiv – nur für neue Einträge.
    Fraud-Cap: Tagesschritte werden auf max. 20.000 gekappt (src/lib/server/stepsService.ts).
  schritte:
    - tages_schritte_von: 0
      tages_schritte_bis: 3_999
      punkte: 0
      erlaeuterung: "Unterhalb des Mortalitäts-Schwellwertes"
    - tages_schritte: 4_000
      punkte: 10
      erlaeuterung: "Einstiegsschwelle – erste messbare Mortalitätsreduktion"
    - tages_schritte_von: 4_001
      tages_schritte_bis: 6_999
      formel: "10 P + 5 P pro angefangene 500 Schritte"
      beispiel: "5.500 Schritte = 20 P"
      erlaeuterung: "Gleitende Belohnung bis zum Mindesttagesziel"
    - tages_schritte: 7_000
      punkte: 40
      bezeichnung: "Volle Tagespunkte"
      erlaeuterung: "7.000 Schritte senken Sterberisiko um ≈ 50–70 %"
    - tages_schritte_ab: 7_001
      formel: "40 P + 5 P pro angefangene 500 Schritte"
      beispiele:
        - schritte: 10_000
          punkte: 70
        - schritte: 20_000
          punkte: 170
      erlaeuterung: "Kein Deckel, aber Fraud-Checks"

  bewegung_laufen_radfahren:
    - woechentliche_min_von: 0
      woechentliche_min_bis: 49
      punkte: 0
    - woechentliche_min: 50
      punkte: 50
      erlaeuterung: "≈ ⅓ des WHO-Ziels – analog zu 4.000 Schritten"
    - woechentliche_min_von: 51
      woechentliche_min_bis: 150
      formel: "50 P + 15 P je angefangene 10 min"
      beispiele:
        - min: 80
          punkte: 95
        - min: 120
          punkte: 155
    - woechentliche_min: 150
      punkte: 200
      bezeichnung: "Volle Wochenpunkte"
      erlaeuterung: WHO-Empfehlung erreicht
    - woechentliche_min_ab: 151
      formel: "200 P + 15 P je angefangene 10 min"
      beispiel:
        min: 200
        punkte: 275

  bildung:
    - ereignis: Quiz absolvieren
      bedingung: "100 % richtige Antworten"
      punkte: 40
      erlaeuterung: "Gleiche Größenordnung wie Schritt-Tagesziel (7.000 = 40 P)"
    - ereignis: Refresh-Quiz
      bedingung: "90 Tage nach letztem Abschluss, erneut 100 %"
      punkte: 40
      erlaeuterung: "Festigt Wissen & liefert denselben sofortigen Reward"

  streak_bonus:
    schritte:
      - modul: Streak-Tag
        bedingung: "Min. 7.000 Schritte aufeinanderfolgend"
        punkte: 20  # ½ × 40
        beispiel: "5-Tage-Streak: +100 P"
      - modul: Streak-Woche
        bedingung: "7 aufeinanderfolgende Tage ≥ 7.000 Schritte ODER Mindestwochenschritte 49.000"
        punkte: 60  # 1,5 × 40
        beispiel: "Tag 7 +60 P, Tag 14 +60 P, ..."
    bewegung:
      - modul: Streak-Woche
        bedingung: "Zweite und jede folgende Woche ≥ 150 min"
        punkte: 100  # ½ × 200
        beispiel: "3-Wochen-Streak: +300 P"
      - modul: Streak-Monat
        bedingung: "4 aufeinanderfolgende Ziel-Wochen"
        punkte: 300  # 1,5 × 200
        badge: "Erster Move-Champion-Badge"
    bildung:
      - modul: Wissens-Combo
        bedingung: "3 perfekte Quizze innerhalb von 7 Tagen"
        punkte: 40
      - modul: Wissens-Streak
        bedingung: "Jede weitere Woche mit ≥ 3 perfekten Quizzen"
        punkte: 20  # je Woche
      - modul: Quartals-Mastery
        bedingung: "12 Streak-Wochen am Stück"
        punkte: 60
        einmalig: true

