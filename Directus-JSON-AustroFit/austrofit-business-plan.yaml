  budget:
    jahr_1_monatlich_eur: 170
    cac_ziel_erste_1000_nutzer_eur: [8, 10]

  vertrieb:
    b2c:
      strategie: Inbound (Content-Marketing, Social Ads, Referral)
    b2b:
      phase_1:
        zeitraum: "Jahr 1–2"
        kanal: Affiliate-Netzwerke (AWIN)
        vorteile:
