  loesung_ebenen:
    individuell: "Motivation zu mehr Bewegung, Vorsorge & Gesundheitswissen"
    sozial: "Erreichbarkeit von benachteiligten Gruppen durch Barrierefreiheit"
    systemisch: "Beitrag zu Gesundheitszielen Österreich (Ziel 1, 2, 3, 5, 6, 8, 9)"

  skalierbarkeit:
    geografisch: DACH-Raum
