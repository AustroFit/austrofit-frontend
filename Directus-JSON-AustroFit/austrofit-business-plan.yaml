# 8. NACHHALTIGKEIT (ESG)
# ──────────────────────────────────────────────
esg:
  sdg_ziele:
    - sdg: 3
      titel: "Gesundheit & Wohlergehen"
      beitrag: "Gamifizierte Bewegungs-, Bildungs- und Vorsorge-Module; KPIs DSGVO-konform im Impact-Report"
    - sdg: 8
      titel: "Menschenwürdige Arbeit & Wirtschaftswachstum"
      beitrag: "Pay-per-Redemption ohne Fixkosten für KMU; regionale Sichtbarkeit"
    - sdg: 12
      titel: "Nachhaltiger Konsum & Produktion"
      beitrag: "Low-CO₂-Architektur; ESG-Partner bevorzugt und unterstützt"

  oekologisch:
    - Aktive Mobilität (Schritte statt Auto) senkt CO₂
    - Regionale, saisonale Partner verkürzen Transportwege
    - Extra Punkte bei Partnern mit Nachhaltigkeitslabel
  sozial:
    - Dauerhaft gratis (Einkommen/Bildung spielen keine Rolle)
    - Bildungsmodul stärkt Gesundheitskompetenz
    - Community vernetzt Nutzer*innen
    - Intuitive UI/UX + Gamification aktivieren auch Technikferne
  governance:
    - DSGVO-konformer Umgang mit Gesundheitsdaten
    - Privacy-by-Design (pseudonymisierte Daten)
    - Kein Datenverkauf; Bonuspunkte nur bei freiwilliger Forschungsfreigabe
    - Partner erfüllen ESG-Mindeststandards

  impact_flywheel: >
    Jede absolvierte Challenge verbessert die Gesundheit, stärkt regionale
    Wirtschaft und lenkt Kaufkraft in verantwortungsvolle Produkte.

