# ──────────────────────────────────────────────
# 1. EXECUTIVE SUMMARY
# ──────────────────────────────────────────────
executive_summary:
  mission: >
    AustroFit ist eine mobile Multipartner-Plattform, die Menschen dafür belohnt,
    dass sie sich aktiv um ihre Gesundheit kümmern. Nutzer*innen sammeln durch
    Bewegung, Gesundheitsbildung und Vorsorge Punkte und lösen diese bei
    regionalen Partnerunternehmen ein.
  vision: >
    Prävention sichtbar, motivierend und sozial verankert machen – mit dem Ziel,
    die individuelle Gesundheit zu verbessern und das österreichische
    Gesundheitssystem langfristig zu entlasten.

  problem:
    praevention_anteil_pct: 5          # Anteil der Gesundheitsausgaben in Prävention
    vorsorge_nutzung_pct: 15           # Bevölkerungsanteil, der Vorsorgeangebote nutzt
    lebensstil_erkrankte_mio: 4.9      # Personen mit lebensstilbedingten Erkrankungen
    eingeschraenkte_gesundheitskompetenz_pct: 50  # davon mit eingeschränkter Gesundheitskompetenz

  loesung_usp:
    - Bewegungstracking via HealthKit / Health Connect
    - Gesundheitsbildung via evidenzbasierte Artikel & Quiz
    - Gamified Belohnungssystem (Punkte, Badges, Challenges)
    - Regionale Partnerökonomie (Einlösung nur bei gesundheitsfördernden Angeboten)

  markt:
    smartphone_besitzer_18_64_mio: 5.5
    inaktiv_oder_teil_aktiv_mio: 4.3
    marktdurchdringung_5pct_nutzer: 270_000
    fitness_app_markt_wachstum_2024_2027_pct: 34

  geschaeftsmodell:
    nutzer_kostenlos: true
    einnahmequellen:
      - Provisionen bei Gutscheineinlösung
      - Partnerpakete (Sichtbarkeit, Features)
      - Listungsgebühren
    umsatz_prognose:
      jahr_3:
        nutzer: 800
        partner: 40
        umsatz_eur: 11_000

  finanzplanung:
    kapitalbedarf_eur: 16_000
    eigenkapital_vorhanden: true
    foerderantraege_geplant:
      - aws First Incubator
      - FFG Projekt.Start
      - Wirtschaftsagentur Wien
      - NeuFöG
    break_even:
      monat: 42
      nutzer: 1_010
      partner: 51

  roadmap_highlights:
    - "MVP weitgehend fertiggestellt (Stand März 2026): Bildungsmodul, Punktesystem, Direktpartner-Rewards, Auth, PWA, Analytics"
    - "Bewegungstracking Android (Health Connect) implementiert; iOS + Laufen/Radfahren folgen Phase 2"
    - "AWIN-Affiliate-Integration erst Phase 2 (nach Nutzerbasis-Aufbau)"
    - "Jahr 1: 200 Nutzer*innen, 10 Direktpartner"
    - "Jahr 5: 2.000 Nutzer*innen, 150 Partner"

  team:
    gruender: Johannes H. Gnong
    co_founder_gesucht: CTO (10–15 % Equity)
    expertise: Gesundheitstechnologie & Regulatory Affairs (7+ Jahre)

# ──────────────────────────────────────────────
# IMPLEMENTIERUNGSSTAND (März 2026)
# Quelle: austrofit-strategy.yaml v1.2 + Codebasis
# ──────────────────────────────────────────────
implementierungsstand:
  stand: "2026-03-09"
  tech_stack:
    frontend: "SvelteKit (Svelte 5 Runes: $state, $derived, $props, $effect)"
    css: "Tailwind CSS v4 via @tailwindcss/vite"
    backend: "Directus CMS v11.7.2 (REST API)"
    native_wrapper: "Capacitor"
    health_api_android: "@capgo/capacitor-health v8.2.17 (Capacitor 8)"
    health_api_ios: "Apple HealthKit – Phase 2"
    analytics: "PostHog EU Cloud (DSGVO-konform, Frankfurt)"
    hosting: "Vercel (frontend, nodejs22.x) + Directus Cloud"

  module:
    bildungsmodul:
      status: "FERTIG"
      details: "Artikel, Quizze (anonym + authentifiziert), Claim-Flow nach Registrierung"
    punktesystem:
      status: "FERTIG"
      details: "points_ledger, Streak, Level (5 Stufen), 5 Badges, anonymer Claim-Flow"
    bewegungstracking:
      status: "TEILWEISE"
      details: "Android Health Connect (Capacitor) implementiert; manuelle Eingabe (Test-Modus) fertig"
      offen: "iOS HealthKit, Laufen/Radfahren-Tracking (Minuten/Woche)"
    rewards_direktpartner_tech:
      status: "CODE FERTIG"
      details: "Technischer Flow (Redeem, QR-Gutscheine, Marketplace) vollständig implementiert"
      offen_geschaeftlich: "Keine echten Partner-Verträge, kein Onboarding-Prozess, kein B2B-Dashboard – Business-seitig Phase 2"
    rewards_awin:
      status: "OFFEN – Phase 1 (Business)"
      details: "AWIN Publisher-Account bereits vorhanden (ID 1896704, März 2026); 52 Programme identifiziert, 0 beigetreten; Frontend-Integration (Deeplinks, Tracking) noch offen"
    user_management:
      status: "FERTIG"
      details: "Directus Auth, Login, Registrierung, Profil-Einstellungen, DSGVO-Löschung"
    community:
      status: "OFFEN"
      details: "Phase 2 – Leaderboard, Social Sharing, Events"
    partner_dashboard_b2b:
      status: "OFFEN"
      details: "Nutzer-seitige Marketplace-Seite fertig; B2B-Self-Service-Dashboard Phase 2"
    analytics:
      status: "FERTIG"
      details: "PostHog EU, 7 Core-Events: user_registered, user_logged_in, dashboard_viewed, health_permission_result, quiz_completed, steps_synced, voucher_redeemed"
    pwa:
      status: "FERTIG"
      details: "Service Worker, Install-Banner, Background Sync (Schritt-Sync-Flag)"

  deployment:
    production: "austrofit.at (Vercel, main branch)"
    preview: "dev.austrofit.at (Vercel, dev branch)"
    android_app: "Capacitor Build vorbereitet (android/), Google Play Upload ausstehend"
    ios_app: "Phase 2 – TestFlight noch nicht"

# ──────────────────────────────────────────────
# 2. PRODUKT
# ──────────────────────────────────────────────
produkt:
  name: AustroFit-App
  typ: Mobile Multipartner-Plattform
  kein_medizinprodukt: true
  mdr_regulation: "(EU) 2017/745 – nicht anwendbar"

  beschreibung: >
    Gesundheitsförderndes Verhalten wird sichtbar belohnt. Nutzer*innen sammeln
    Punkte durch Bewegung, Gesundheitsbildung und Präventionsmaßnahmen und lösen
    diese bei regionalen Partnerunternehmen ein.

  punktequellen:
    - Bewegung (Schritte, Laufen, Radfahren)
    - Gesundheitsbildung (Artikel lesen + Quiz bestehen)
    - Präventionsmaßnahmen (Vorsorgeuntersuchungen, Impfungen)

  einloesbare_partner_kategorien:
    - Fitnessstudios & Sportgeschäfte
    - Private Krankenversicherungen, Wellnessbetriebe, Thermen, Spas, Freibäder
    - Apotheken, Beratungen & Therapien (Psychologie, Ernährung)
    - BIO-Lebensmittelhersteller & Pflegeproduktanbieter

  gamification:
    framework: Octalysis (Core Drives 1, 2, 5)
    testing: A/B-Tests
    elemente:
      - Tages- und Wochenziele (BMWKMS-Empfehlungen)
      - Streaks und Challenges
      - Levelsystem mit steigenden Vorteilen
      - Digitale Badges als Erfolgsmarker
      - Regelmäßige Gewinnspiele

  punkte_audit_log:
    beschreibung: Jede Punktebuchung wird im Backend mit Zeitstempel & Quelle versioniert
    zweck: Spätere Validierungen und Anpassungen

  community_funktionen:
    - Gemeinsame Aktivitäten
    - Bestenlisten
    - Regionale Events
    - Austausch

  mvp:
    version: "v1.0"
    ziel_datum: "Q3 2026 (App Store / Google Play Launch)"
    umfang_implementiert:
      - "Bewegungstracking Android (Google Health Connect) – Schritte ✓; Laufen/Radfahren → Phase 2"
      - "Bildungsmodul (eingebettete Artikel & Quiz) – vollständig ✓"
      - "Punktebackend (Ledger, Streak, Level 1–5, 5 Badges) – vollständig ✓"
      - "Direktpartner-Gutscheine mit QR-Code (Pay-per-Redemption) ✓"
      - "User-Management: Login, Registrierung, Profil, DSGVO-Kontoloeschung ✓"
      - "Analytics: PostHog EU Cloud, 7 Core-Events ✓"
      - "PWA: Service Worker, Install-Banner, Background Sync ✓"
      - "Capacitor Android Native Build (Health Connect integriert) ✓"
    umfang_phase_2:
      - "Bewegungstracking iOS (HealthKit)"
      - "Bewegungstracking: Laufen + Radfahren (Minuten/Woche)"
      - "AWIN-Affiliate-Integration (Webhook, Deeplinks)"
      - "B2B Partner-Dashboard (Self-Service: Angebots-Upload, KPIs)"
      - "Community-Features (Leaderboard, Social Sharing, Events)"
      - "Gleitende Schritt-Skala 4001–6999 (aktuell MVP Flat-Rate 10P)"
      - "Täglicher Streak-Bonus (+20P/Tag), Bewegungs-Streak-Boni"

  mvp_hypothesen:
    engagement: "≥ 50 % der Erstnutzer absolvieren ≥ 3 Challenges in 14 Tagen"
    belohnung: "≥ 30 % der aktiven Nutzer lösen ≥ 1 Gutschein pro Monat ein"
    partner: "≥ 70 % der gelisteten Angebote werden im ersten Quartal mindestens einmal eingelöst"

  henne_ei_strategie:
    phase_1:
      bezeichnung: "Affiliate-Netzwerk AWIN (Online-Partner)"
      begruendung: >
        AWIN ermöglicht sofort ein umfangreiches Angebot für User ohne
        individuelle Partnerverhandlungen. Kein Partner-Onboarding, kein
        B2B-Dashboard, keine Exklusivität nötig – idealer Kaltstart.
      status: "BEREIT – AWIN Publisher-Account bereits vorhanden (ID: 1896704, Stand März 2026); 52 Programme identifiziert, 0 beigetreten"
      naechste_schritte: "Programme auswählen und beitreten; Deeplinks + Tracking-Integration ins Frontend"
      tech_bereit: "Code-Infrastruktur für Direktpartner bereits implementiert und nutzbar auch für AWIN-Gutscheine"
    phase_2:
      bezeichnung: "Direktpartner (regionale KMU)"
      begruendung: >
        Sobald kritische Nutzerzahl erreicht: Direktverhandlungen mit regionalen
        Partnern (Fitnessstudios, Thermen, Bio-Läden). Höhere Provision möglich,
        stärkere Markenbindung, ESG-Fokus.
      status: "OFFEN – nach Nutzerbasis-Aufbau"
      noch_fehlend:
        - Echte Partner-Beziehungen (noch keine Verträge)
        - Partner-Onboarding-Prozess
        - B2B Self-Service-Dashboard (Angebots-Upload, Statistiken)
        - KYC-Light Verfahren (Firmenbuch + ESG-Selbstaudit)

  skalierung_features_geplant:
    - Schnittstellen zu Krankenkassen (ELGA, SVS)
    - Onboarding-Prozesse für Partner (verifizierte Angebote)
    - Impact-Analytics-API für B2G-Partner (differential privacy, DSGVO-konform)

  fraud_detection:
    phase_1:
      - Device-ID-Check
      - GPS-Plausibilität
      - Schritt-Spike-Filter (> 20.000 Steps/h)
    phase_2:
      - ML-Anomalie-Scoring: Isolation-Forest auf Einlösemustern, Schwellenwert 0.85
    partner_whitelisting: KYC-Light (Firmenbuch + ESG-Selbstaudit)
    nutzerverhalten: Dreistufige Warn-/Sperr-Logik mit Transparenzbericht im Profil

  kundennutzen:
    b2c:
      - Punkte sammeln durch Bewegung, Bildung, Prävention
      - Belohnungen bei regionalen Partnern einlösen
      - Fortschritt durch Gamification erleben
      - Vernetzung durch Community-Funktionen
      - App dauerhaft kostenlos
      - WCAG_2_1_AA_konform: true
    b2b:
      - Zugang zu gesundheitsbewusster, aktiver Zielgruppe
      - Neukundengewinnung & Kundenbindung
      - Regionale Sichtbarkeit & Markenwahrnehmung
      - Datenbasierte Rückmeldungen (bei gebuchten Paketen)
    gesellschaft:
      - Niedrigschwellige Prävention
      - Soziale Teilhabe
      - Förderung regionaler Wertschöpfung

  usp:
    kombination:
      - Präventives Verhalten (Bewegung, Bildung, Vorsorge)
      - Positive Verstärkung durch Gamification
      - Soziale Motivation durch Community & Events
      - Regionale Belohnung bei gesundheitsfördernden Unternehmen
    differenzierung_zu_wettbewerb: >
      Während Sweatcoin/WeWard nur Schritte mit monetären Rewards belohnen und
      Krankenkassen-Bonusprogramme ohne Gamification auskommen, verbindet
      AustroFit Prävention, Bildung und Community mit regionaler Wertschöpfung.

  staerken:
    - Ganzheitlichkeit (Bewegung, Bildung, Prävention, Community, Belohnung)
    - Gamification & Motivation (wissenschaftlich fundiert, AIHTA-Studie)
    - Community & soziale Teilhabe
    - Regionale Einbindung
    - Systemischer Mehrwert (österreichische Gesundheitsziele)
    - Kostenfreiheit & Barrierearmut

  schwaechen_und_loesungen:
    - schwaeche: Partnerabhängigkeit
      loesung: Diversifiziertes Partner-Portfolio + Start über Affiliate-Netzwerke
    - schwaeche: Keine monetären Prämien
      loesung: Indirekte Vorteile über Rabatte & Gutscheine für gesundheitsfördernde Angebote
    - schwaeche: Erfolgsfaktor Nutzerbindung
      loesung: Streaks, Challenges, Community-Events, Feedback-Schleifen
    - schwaeche: Technologische Abhängigkeit (HealthKit / Health Connect)
      loesung: Mehrere Schnittstellen + mehrstufiges Fraud-Detection-System

  innovationsgrad:
    arten:
      - Soziale Innovation
      - Prozessinnovation
      - Kreativwirtschaftliche Innovation (Octalysis, Storytelling)
      - Umwelt & Nachhaltigkeit (ESG-Partner, regionale Einlösung)
      - Technische Innovation (Privacy-by-Design, Fraud-Detection)
    marktvergleich:
      international: "niedrig bis mittel (Sweatcoin, WeWard: nur Schritte)"
      national: "mittel (SVS, ÖGK: ohne Gamification)"
      austrofit: "hoch – erste Plattform in Österreich mit dieser Tiefe"

  markenschutz:
    domain_registriert: true
    markenanmeldung_geplant: true
    nizza_klassen:
      - 42  # Software, IT-Dienstleistungen
      - 44  # Gesundheitsförderung
    patent: "nicht angestrebt (Innovation in strategischer Kombination, nicht Einzeltechnologie)"
    urheberrecht: "Quellcode automatisch nach § 40a UrhG"
    vertraglicher_schutz: "AGB & Lizenzbedingungen"

  leistungserstellung:
    phase: Startphase als EPU
    outsourcing:
      - MVP-Software-Entwicklung
      - UX/UI-Design
      - Content & digitales Marketing
      - Recht & Datenschutz (bei Bedarf)
      - Steuerberatung
    tech_basis:
      frontend: "SvelteKit (Svelte 5 Runes), Tailwind CSS v4"
      backend: "Directus CMS v11.7.2 (Headless CMS + REST API)"
      native: "Capacitor (@capgo/capacitor-health v8.2.17)"
      hosting: "Vercel (Frontend, nodejs22.x)"
      analytics: "PostHog EU Cloud (DSGVO-konform, Frankfurt)"
      health_apis:
        android: "Google Health Connect (via @capgo/capacitor-health)"
        ios: "Apple HealthKit (Phase 2)"
    punktevergabe_automatisiert:
      - Bewegungstracking über Schnittstellen
      - Artikel lesen + Quizabschluss
      - Nachweis-Upload (Impfpass, Vorsorge) mit Backend-Validierung
    partner_dashboard: Selbstverwaltung (Angebote, Einlösungen, Statistiken)

# ──────────────────────────────────────────────
# 3. UNTERNEHMEN & MANAGEMENT
# ──────────────────────────────────────────────
unternehmen:
  name: AustroFit
  rechtsform_aktuell: "in Vorbereitung"
  rechtsform_geplant: "AustroFit e.U."
  rechtsform_spaeter: "GmbH (bei steigender Komplexität)"
  sitz: Wien
  gruendungsstatus: "in Vorbereitung"
  gruendung_nach: "Fertigstellung des MVP"

  gruender:
    name: Johannes H. Gnong
    erfahrung_jahre: 7
    branche: Medizinprodukte
    expertise:
      - Quality Management
      - Regulatory Affairs
      - Medizinprodukte-Softwareentwicklung
    rollen:
      - Strategie, Produktentwicklung & Partnerakquise
      - Technische Basis (MVP-Definition, Prozessautomatisierung)
      - Regulatorische & datenschutzrechtliche Umsetzung

  team_ausbau:
    cto:
      titel: Co-Founder*in / CTO
      equity_pct_range: [10, 15]
      fokus: Mobile-Development, Gamification, DevOps
      timing: ab MVP-Validierung
    cmo:
      titel: Chief Marketing Officer / Growth Lead
      start: ab > 1.000 Nutzer*innen
      überbrückung: Freelancer
    cfo:
      titel: CFO Finance & Controlling
      start_intern: ab Jahr 3
      ueberbrueckung: externe Beratung
    advisory_board:
      aufbau: ab Jahr 1
      bereiche:
        - Public Health
        - Growth Marketing
        - IT-Security
      interesse_bekundet: Future Health Lab

  swot:
    staerken:
      - Fachliche Expertise in Gesundheitstechnologie & Regulatorik
      - Innovatives, gamifiziertes Präventionsmodell mit evidenzbasiertem Impact
      - Kostenfreier Zugang & niedrige Einstiegshürden
      - Regionale Verankerung & lokale Wertschöpfung
      - Community-Fokus als Verstärker für soziale Teilhabe
      - Kombination aus Bildung, Bewegung, Belohnung und sozialem Impact
    schwaechen:
      - Noch kein fixes Kernteam / stark vom Gründer abhängig
      - Noch kein Advisory Board
      - Plattformnutzen abhängig vom regionalen Partnerangebot
      - Impact nur bei regelmäßiger Nutzung (Gamification muss langfristig motivieren)
      - Technologische Abhängigkeit von HealthKit / Health Connect
    chancen:
      - Wachsende Nachfrage nach niedrigschwelliger Prävention & Digital Health
      - Hohes gesellschaftliches & politisches Interesse an Gesundheitsförderung
      - Starke Wachstumsprognose für Fitness- & Gesundheits-Apps in Österreich
      - Förderung durch öffentliche Stellen
      - Anschlussfähigkeit an nationale Gesundheitsziele
    risiken:
      - Hoher Wettbewerb im App-Markt
      - Kritische Masse an Nutzer*innen & Partnern muss erst aufgebaut werden
      - Nutzerbindung erfordert ständige Optimierung
      - Mögliche Verzögerungen bei B2G-Kooperationen

  ziele:
    kurzfristig_0_12_monate:
      fokus: B2C
      ziele:
        - MVP entwickeln und launchen (Bewegungstracking, Bildungsmodul, Punktesystem)
        - SEO-Blog mit gesundheitsbezogenen Inhalten aufbauen
        - 200 registrierte Nutzer*innen gewinnen
        - 10 regionale Partner (via Affiliate-Netzwerk)
        - Förderanträge vorbereiten & als Social Business etablieren
    mittelfristig_1_3_jahre:
      fokus: B2B2C
      ziele:
        - B2B2C-Modell mit direkten Kooperationspartnern
        - 1.000 aktive Nutzer*innen
        - 40 Partnerunternehmen
        - Community-Challenges & Events
        - Partner-Dashboard mit KPIs
        - Beiträge zu Gesundheitszielen (Ziel 3, 5, 8)
    langfristig_3_5_jahre:
      fokus: B2G2C
      ziele:
        - Belohnungsfähige Präventionsmaßnahmen in staatliche Programme integrieren
        - Interdisziplinäres Kernteam aufbauen
        - Erste B2G-Kooperation
        - Forschungspartnerschaften zur Wirkungsmessung
        - Beiträge zu Gesundheitszielen (1, 2, 6, 9)

  umsetzungsplanung:
    phasen:
      - name: MVP-Entwicklung & Vorgründung
        zeitraum: "< 1 Jahr"
        app:
          - Bewegungstracking
          - Bildungsmodul (Artikel & Quiz)
          - Punktesystem & Einlösung bei Affiliate-Partnern
        unternehmen:
          - Business Plan fertigstellen & einreichen (i2b-Wettbewerb)
          - Pitch-Unterlagen erstellen
          - Webseite + Gesundheitsblog aufbauen
          - Gewerbeanmeldung, Markenanmeldung, Förderanträge vorbereiten
          - Partnerunternehmen via Affiliate-Netzwerke
      - name: MVP-Launch & Validierung / Gründungsphase
        zeitraum: "< 1 Jahr"
        app:
          - Veröffentlichung (Google Play)
          - Marketingkampagnen zur Validierung
        unternehmen:
          - Firmengründung
          - Markenanmeldung
          - Erste Fördermittel
          - Erste Gespräche (Future Health Lab)
      - name: App-Entwicklung & B2B2C-Erweiterung / Skalierung
        zeitraum: "1–3 Jahre"
        app:
          - Gamification (Challenges, Gewinnspiele, Maskottchen, Leveling, Badges)
          - User & Partner-Dashboard
          - Community & UI/UX
          - Direkte Partnerschaften (B2B2C)
