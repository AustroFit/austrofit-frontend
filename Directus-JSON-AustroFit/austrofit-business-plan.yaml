      massnahmen: ["1–2 Gutscheineinlösungen/Monat"]
      kpi: "ARPU ≥ 0,41 €/Monat"

  phasen:
    vorbereitungsphase:
      - SEO-Blog (Bewegung, Ernährung, Prävention, mentale Gesundheit)
      - Organische Reichweite über Google-Suche
