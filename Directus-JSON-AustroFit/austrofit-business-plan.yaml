        partner_scoring: "Engagement-Score 0–100 für Follow-up-Frequenz"
    b2g:
      massnahmen:
        - Pilotprojekte mit Gemeinden, Krankenkassen, Sozialversicherungen
        - Anbindung an bestehende Initiativen (Bewegt im Park, Jackpot.fit)
        - Nutzung bestehender Gesundheitsförderprogramme

  partner_onboarding:
    schritte:
