    systemisch: Integration in Gesundheitsprogramme & Forschung
    b2g_ab_jahr: 3

  impact_messung:
    quantitativ:
      - Schritte / Bewegungsminuten pro Woche
      - Anzahl gelesener Artikel & absolvierter Quizze
      - Teilnahme an Vorsorgeprogrammen
      - Community-Aktivität (Events, Challenges)
